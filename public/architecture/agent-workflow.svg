<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="82" y1="54" x2="1362" y2="904" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9F8FF"/>
      <stop offset="0.48" stop-color="#F7FCFF"/>
      <stop offset="1" stop-color="#FFF8F4"/>
    </linearGradient>
    <linearGradient id="panel2" x1="104" y1="72" x2="1342" y2="894" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FBFCFF" stop-opacity="0.99"/>
    </linearGradient>
    <linearGradient id="mainNode" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EDF2FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="subNode" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF4E8"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="stateNode" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EDFFF8"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow2" x="-30" y="-30" width="1500" height="1020" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#64748B" flood-opacity="0.13"/>
    </filter>
    <filter id="blur2" x="-30" y="-30" width="220" height="220" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5562F6"/>
    </marker>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
    <style>
      .title { font: 700 38px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #162033; }
      .subtitle { font: 500 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #526075; }
      .small { font: 600 13px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #44516A; letter-spacing: 0.08em; text-transform: uppercase; }
      .nodeTitle { font: 700 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #18233A; }
      .nodeTag { font: 700 13px 'Space Grotesk', 'Segoe UI', sans-serif; fill: #4B5A74; }
      .nodeCopy { font: 500 14px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #536176; }
      .chip { font: 600 13px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #314158; }
      .laneTitle { font: 700 15px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #24324A; }
      .bullet { font: 500 14px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #526075; }
    </style>
  </defs>

  <rect width="1440" height="960" rx="42" fill="url(#bg2)"/>
  <g filter="url(#blur2)" opacity="0.32">
    <circle cx="246" cy="182" r="96" fill="#C4B5FD"/>
    <circle cx="1208" cy="176" r="120" fill="#93C5FD"/>
    <circle cx="1108" cy="780" r="130" fill="#FDBA74"/>
  </g>

  <g filter="url(#shadow2)">
    <rect x="56" y="56" width="1328" height="848" rx="40" fill="url(#panel2)" stroke="#E4E9F6"/>
  </g>

  <text x="92" y="122" class="small">Agent Workflow</text>
  <text x="92" y="166" class="title">智能体设计图</text>
  <text x="92" y="199" class="subtitle">对应 `test_agent/agent.py` 的真实 LangGraph 节点、HITL 审核与 GraphRAG 工具调用关系</text>

  <rect x="92" y="232" width="314" height="36" rx="18" fill="#EEF2FF" stroke="#CDD8FF"/>
  <text x="122" y="255" class="chip">Route: general_qa / model_param_workflow</text>

  <g>
    <rect x="92" y="304" width="1240" height="130" rx="30" fill="#FFFFFF" stroke="#E3E9F6"/>
    <text x="124" y="342" class="laneTitle">General QA 支路</text>
    <rect x="124" y="362" width="180" height="50" rx="18" fill="url(#mainNode)" stroke="#D4DEFF"/>
    <text x="148" y="392" class="nodeTitle">general_qa_prepare</text>
    <rect x="348" y="362" width="180" height="50" rx="18" fill="url(#mainNode)" stroke="#D4DEFF"/>
    <text x="379" y="392" class="nodeTitle">general_qa_agent</text>
    <rect x="572" y="362" width="170" height="50" rx="18" fill="url(#subNode)" stroke="#FFD7B3"/>
    <text x="606" y="392" class="nodeTitle">tools_condition</text>
    <rect x="786" y="362" width="186" height="50" rx="18" fill="url(#mainNode)" stroke="#D4DEFF"/>
    <text x="818" y="392" class="nodeTitle">general_qa_tools</text>
    <rect x="1016" y="362" width="210" height="50" rx="18" fill="url(#stateNode)" stroke="#CAEFDF"/>
    <text x="1048" y="392" class="nodeTitle">general_qa_finalize</text>
    <path d="M 304 387 H 348" stroke="#5562F6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow2)"/>
    <path d="M 528 387 H 572" stroke="#5562F6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow2)"/>
    <path d="M 742 387 H 786" stroke="#5562F6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow2)"/>
    <path d="M 972 387 H 1016" stroke="#5562F6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow2)"/>
    <path d="M 878 362 C 878 332, 652 332, 652 362" stroke="#F59E0B" stroke-width="4" stroke-dasharray="8 10" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <rect x="92" y="470" width="1240" height="260" rx="34" fill="#FFFFFF" stroke="#E4E9F6"/>
    <text x="124" y="508" class="laneTitle">Model Parameter Workflow 主链</text>

    <rect x="124" y="540" width="164" height="84" rx="22" fill="url(#mainNode)" stroke="#D4DEFF"/>
    <text x="154" y="568" class="nodeTag">intake</text>
    <text x="152" y="594" class="nodeTitle">问题解析</text>
    <text x="152" y="616" class="nodeCopy">抽取 location / model / parameters / kg_id</text>

    <rect x="332" y="540" width="174" height="84" rx="22" fill="url(#subNode)" stroke="#FFD7B3"/>
    <text x="362" y="568" class="nodeTag">human_check</text>
    <text x="362" y="594" class="nodeTitle">人工校核</text>
    <text x="362" y="616" class="nodeCopy">HITL 审核实体完整性，必要时中止或继续</text>

    <rect x="550" y="540" width="150" height="84" rx="22" fill="url(#mainNode)" stroke="#D4DEFF"/>
    <text x="584" y="568" class="nodeTag">route</text>
    <text x="584" y="594" class="nodeTitle">路由判断</text>
    <text x="574" y="616" class="nodeCopy">是否进入地理补全</text>

    <rect x="744" y="540" width="216" height="84" rx="22" fill="url(#mainNode)" stroke="#D4DEFF"/>
    <text x="778" y="568" class="nodeTag">gather_evidence_agent</text>
    <text x="778" y="594" class="nodeTitle">证据收集</text>
    <text x="772" y="616" class="nodeCopy">优先 local，再视情况触发 global</text>

    <rect x="1004" y="540" width="168" height="84" rx="22" fill="url(#mainNode)" stroke="#D4DEFF"/>
    <text x="1039" y="568" class="nodeTag">synthesize</text>
    <text x="1036" y="594" class="nodeTitle">综合生成</text>
    <text x="1030" y="616" class="nodeCopy">参数建议、摘要、证据映射</text>

    <rect x="1216" y="540" width="116" height="84" rx="22" fill="url(#stateNode)" stroke="#CAEFDF"/>
    <text x="1238" y="568" class="nodeTag">quality_check</text>
    <text x="1236" y="594" class="nodeTitle">质检</text>
    <text x="1234" y="616" class="nodeCopy">单位与依据覆盖度</text>

    <path d="M 288 582 H 332" stroke="#5562F6" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow2)"/>
    <path d="M 506 582 H 550" stroke="#5562F6" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow2)"/>
    <path d="M 700 582 H 744" stroke="#5562F6" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow2)"/>
    <path d="M 960 582 H 1004" stroke="#5562F6" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow2)"/>
    <path d="M 1172 582 H 1216" stroke="#5562F6" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow2)"/>
  </g>

  <g>
    <rect x="528" y="664" width="268" height="182" rx="28" fill="#FFF8F2" stroke="#FFD7B3"/>
    <text x="558" y="704" class="laneTitle">可选分支：地理补全 + 审批</text>
    <rect x="558" y="726" width="104" height="44" rx="16" fill="#FFFFFF" stroke="#FFE2C8"/>
    <text x="576" y="753" class="nodeTag">complement</text>
    <rect x="682" y="726" width="82" height="44" rx="16" fill="#FFFFFF" stroke="#FFE2C8"/>
    <text x="700" y="753" class="nodeTag">approval</text>
    <path d="M 610 770 V 804 H 724 V 770" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow3)"/>
    <text x="560" y="798" class="nodeCopy">缺位置时进入地理上下文补全，审批通过后回到 gather_evidence_agent</text>
    <rect x="558" y="812" width="102" height="20" rx="10" fill="#FFF0E1"/>
    <text x="576" y="826" class="chip">approval_route</text>
  </g>

  <path d="M 624 624 C 624 646, 624 646, 624 664" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow3)"/>
  <path d="M 764 726 C 852 700, 852 646, 852 624" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow3)"/>
  <path d="M 420 624 C 420 706, 254 706, 254 654" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10" marker-end="url(#arrow3)"/>
  <rect x="126" y="650" width="162" height="42" rx="18" fill="#FFF4E8" stroke="#FFD7B3"/>
  <text x="155" y="676" class="chip">terminate / retry</text>

  <g>
    <rect x="816" y="748" width="264" height="112" rx="26" fill="#F5F8FF" stroke="#D6E0F5"/>
    <text x="844" y="786" class="laneTitle">GraphRAG Tool Belt</text>
    <rect x="844" y="804" width="76" height="28" rx="14" fill="#FFFFFF" stroke="#D8E4FF"/>
    <text x="858" y="823" class="chip">local</text>
    <rect x="934" y="804" width="82" height="28" rx="14" fill="#FFFFFF" stroke="#D8E4FF"/>
    <text x="949" y="823" class="chip">global</text>
    <rect x="1030" y="804" width="34" height="28" rx="14" fill="#FFFFFF" stroke="#D8E4FF"/>
    <text x="1040" y="823" class="chip">…</text>
    <text x="844" y="850" class="nodeCopy">`gather_evidence_tools` 内可调用 `graphrag_local_search`、`graphrag_global_search`、`get_cases`</text>
  </g>

  <path d="M 852 624 V 748" stroke="#5562F6" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 10" marker-end="url(#arrow2)"/>

  <g>
    <rect x="1112" y="742" width="220" height="118" rx="28" fill="url(#stateNode)" stroke="#CAEFDF"/>
    <text x="1140" y="780" class="laneTitle">State &amp; Persistence</text>
    <text x="1140" y="809" class="bullet">• copilotkit_emit_state</text>
    <text x="1140" y="833" class="bullet">• append_thread_turn</text>
    <text x="1140" y="857" class="bullet">• save_result / save_geo_data</text>
  </g>

  <path d="M 1274 624 V 742" stroke="#22C55E" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 10" marker-end="url(#arrow2)"/>

  <g>
    <rect x="1066" y="304" width="266" height="104" rx="26" fill="url(#stateNode)" stroke="#CAEFDF"/>
    <text x="1094" y="340" class="laneTitle">前端接收到的最终结果</text>
    <text x="1094" y="368" class="bullet">• final_response / final_answer</text>
    <text x="1094" y="392" class="bullet">• steps / quality_report / markers</text>
  </g>

  <path d="M 1274 540 C 1310 490, 1290 438, 1200 408" stroke="#22C55E" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10" marker-end="url(#arrow2)"/>

  <g>
    <rect x="92" y="770" width="404" height="90" rx="28" fill="#FFFFFF" stroke="#E3E9F6"/>
    <text x="122" y="808" class="laneTitle">工作流关键特征</text>
    <text x="122" y="835" class="bullet">双支路路由、两次 HITL 审核、GraphRAG 工具闭环、线程级状态同步与结果持久化</text>
  </g>

  <path d="M 438 387 C 438 320, 438 290, 252 290" stroke="#5562F6" stroke-width="4" stroke-dasharray="8 10" marker-end="url(#arrow2)"/>
  <rect x="196" y="274" width="114" height="28" rx="14" fill="#FFFFFF" stroke="#D8E4FF"/>
  <text x="216" y="293" class="chip">intent_route</text>
</svg>
